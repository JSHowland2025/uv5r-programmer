<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UV-5R Quick Programmer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f7f7f7;
      color: #222;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border: 1px solid #ddd;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 8px;
    }
    .note {
      color: #555;
      margin-bottom: 18px;
    }
    .warn {
      background: #fff7d6;
      border: 1px solid #e3c85b;
      padding: 10px;
      margin-bottom: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 10px 16px;
      align-items: center;
    }
    input, select, button, textarea {
      font: inherit;
      padding: 8px;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
    }
    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    #log {
      width: 100%;
      height: 260px;
      margin-top: 18px;
      font-family: monospace;
      white-space: pre-wrap;
    }
    .small {
      font-size: 0.92rem;
      color: #666;
    }
    .hidden {
      display: none;
    }
    .status {
      margin-top: 10px;
      font-weight: bold;
    }
    .ok {
      color: #146c2e;
    }
    .bad {
      color: #9e1c1c;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>UV-5R Quick Programmer</h1>
    <div class="note">
      Simple browser-based programmer for one memory channel at a time.
    </div>

    <div class="warn" id="browserWarning">
      This app requires a Chromium-based browser with Web Serial support, such as Chrome or Edge.
    </div>

    <div class="grid">
      <label for="mem">Memory location</label>
      <input id="mem" type="number" min="0" max="127" value="0" />

      <label for="freq">Receive frequency (MHz)</label>
      <input id="freq" type="number" step="0.00001" value="146.94000" />

      <label for="duplex">Duplex</label>
      <select id="duplex">
        <option value="0">0</option>
        <option value="+">+</option>
        <option value="-">-</option>
      </select>

      <label for="offset">Offset (MHz)</label>
      <input id="offset" type="number" step="0.00001" value="0.60000" />

      <label for="toneMode">Tone mode</label>
      <select id="toneMode">
        <option value="NONE">NONE</option>
        <option value="Tone">Tone</option>
        <option value="TSQL">TSQL</option>
        <option value="DTCS">DTCS</option>
        <option value="Cross">Cross</option>
      </select>

      <label for="ctcssTone" id="ctcssToneLabel">CTCSS tone</label>
      <select id="ctcssTone"></select>

      <label for="dtcsCode" id="dtcsCodeLabel" class="hidden">DTCS code</label>
      <select id="dtcsCode" class="hidden"></select>

      <label for="dtcsPolarity" id="dtcsPolarityLabel" class="hidden">DTCS polarity</label>
      <select id="dtcsPolarity" class="hidden">
        <option value="N">Normal</option>
        <option value="R">Reverse</option>
      </select>

      <label for="crossRxType" id="crossRxTypeLabel" class="hidden">Cross RX type</label>
      <select id="crossRxType" class="hidden">
        <option value="NONE">NONE</option>
        <option value="CTCSS">CTCSS</option>
        <option value="DTCS">DTCS</option>
      </select>

      <label for="crossRxValue" id="crossRxValueLabel" class="hidden">Cross RX value</label>
      <input id="crossRxValue" class="hidden" type="text" placeholder="127.3 or D411N" />

      <label for="crossTxType" id="crossTxTypeLabel" class="hidden">Cross TX type</label>
      <select id="crossTxType" class="hidden">
        <option value="NONE">NONE</option>
        <option value="CTCSS">CTCSS</option>
        <option value="DTCS">DTCS</option>
      </select>

      <label for="crossTxValue" id="crossTxValueLabel" class="hidden">Cross TX value</label>
      <input id="crossTxValue" class="hidden" type="text" placeholder="127.3 or D411N" />

      <label for="name">Channel name</label>
      <input id="name" type="text" maxlength="7" value="REPTST" />
    </div>

    <div class="buttons">
      <button id="connectBtn">Connect</button>
      <button id="readBtn">Read Existing</button>
      <button id="writeBtn">Write Channel</button>
      <button id="disconnectBtn">Disconnect</button>
      <button id="clearLogBtn">Clear Log</button>
    </div>

    <div id="status" class="status bad">Not connected</div>

    <textarea id="log" readonly></textarea>

    <div class="small">
      After writing, you may still need to power-cycle the radio to exit clone mode.
    </div>
  </div>

  <script>
    let port = null;
    let reader = null;
    let writer = null;
    let rxBuffer = new Uint8Array(0);

    const MAGIC = [0x50, 0xBB, 0xFF, 0x20, 0x12, 0x07, 0x25, 0x00];
    const ACK = 0x06;
    const ENQ = 0x02;

    const MEM_RECORD_SIZE = 16;
    const NAME_TABLE_OFFSET = 0x1000;
    const NAME_RECORD_SIZE = 16;
    const NAME_LENGTH = 7;

    const DTCS_CODES = [
      23, 25, 26, 31, 32, 36, 43, 47, 51, 53, 54, 65, 71, 72, 73, 74,
      114, 115, 116, 122, 125, 131, 132, 134, 143, 145, 152, 155, 156,
      162, 165, 172, 174, 205, 212, 223, 225, 226, 243, 244, 245, 246,
      251, 252, 255, 261, 263, 265, 266, 271, 274, 306, 311, 315, 325,
      331, 332, 343, 346, 351, 356, 364, 365, 371, 411, 412, 413, 423,
      431, 432, 445, 446, 452, 454, 455, 462, 464, 465, 466, 503, 506,
      516, 523, 526, 532, 546, 565, 606, 612, 624, 627, 631, 632, 654,
      662, 664, 703, 712, 723, 731, 732, 734, 743, 754
    ];

    const CTCSS_TONES = [
      67.0, 69.3, 71.9, 74.4, 77.0, 79.7, 82.5, 85.4, 88.5, 91.5,
      94.8, 97.4, 100.0, 103.5, 107.2, 110.9, 114.8, 118.8, 123.0,
      127.3, 131.8, 136.5, 141.3, 146.2, 151.4, 156.7, 159.8, 162.2,
      165.5, 167.9, 171.3, 173.8, 177.3, 179.9, 183.5, 186.2, 189.9,
      192.8, 196.6, 199.5, 203.5, 206.5, 210.7, 218.1, 225.7, 229.1,
      233.6, 241.8, 250.3, 254.1
    ];

    function log(msg) {
      const box = document.getElementById("log");
      box.value += msg + "\n";
      box.scrollTop = box.scrollHeight;
      console.log(msg);
    }

    function clearLog() {
      document.getElementById("log").value = "";
    }

    function setStatus(text, ok) {
      const el = document.getElementById("status");
      el.textContent = text;
      el.className = ok ? "status ok" : "status bad";
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function hx(bytes) {
      return Array.from(bytes)
        .map(b => b.toString(16).padStart(2, "0").toUpperCase())
        .join(" ");
    }

    function concatUint8(a, b) {
      const out = new Uint8Array(a.length + b.length);
      out.set(a, 0);
      out.set(b, a.length);
      return out;
    }

    function clearRxBuffer() {
      rxBuffer = new Uint8Array(0);
    }

    async function readExact(n, timeoutMs = 1500) {
      const start = Date.now();

      while (rxBuffer.length < n) {
        if (Date.now() - start > timeoutMs) {
          throw new Error(`Timeout reading ${n} bytes`);
        }

        const { value, done } = await reader.read();
        if (done) {
          throw new Error("Reader closed");
        }

        if (value && value.length) {
          rxBuffer = concatUint8(rxBuffer, value);
        }
      }

      const out = rxBuffer.slice(0, n);
      rxBuffer = rxBuffer.slice(n);
      return out;
    }

    async function writeBytes(arr) {
      await writer.write(new Uint8Array(arr));
    }

    function intToBcdLe4(value) {
      const s = String(value).padStart(8, "0");
      const out = [];
      for (let i = 0; i < 8; i += 2) {
        const hi = Number(s[i]);
        const lo = Number(s[i + 1]);
        out.push((hi << 4) | lo);
      }
      return Uint8Array.from(out.reverse());
    }

    function mhzToFreqBytes(mhz) {
      if (mhz <= 0) throw new Error("Frequency must be > 0");
      return intToBcdLe4(Math.round(mhz * 100000.0));
    }

    function encodeToneToken(token) {
      token = token.trim().toUpperCase();

      if (["", "0", "OFF", "NONE", "-"].includes(token)) {
        return 0;
      }

      if (token.startsWith("D")) {
        if (token.length < 5) {
          throw new Error(`Invalid DCS token: ${token}`);
        }

        const codeStr = token.slice(1, -1);
        const pol = token.slice(-1);
        const code = Number(codeStr);

        if (Number.isNaN(code)) {
          throw new Error(`Invalid DCS code: ${token}`);
        }

        if (!DTCS_CODES.includes(code)) {
          throw new Error(`DCS code ${code} not in UV-5R DTCS table`);
        }

        const index = DTCS_CODES.indexOf(code) + 1;
        if (pol === "N") return index;
        if (pol === "R" || pol === "I") return index + DTCS_CODES.length + 1;
        throw new Error(`Invalid DCS polarity in ${token}; use N or R`);
      }

      const hz = Number(token);
      if (Number.isNaN(hz)) {
        throw new Error(`Invalid tone token: ${token}`);
      }

      const rounded = Number(hz.toFixed(1));
      if (!CTCSS_TONES.includes(rounded)) {
        throw new Error(`CTCSS tone ${rounded.toFixed(1)} is not a standard tone`);
      }

      const value = Math.round(rounded * 10.0);
      if (value < 0x0258) {
        throw new Error(`CTCSS tone too small/invalid for UV-5R encoding: ${token}`);
      }
      return value;
    }

    function computeTxMHz(rxMHz, duplex, offsetMHz) {
      const d = duplex.trim().toLowerCase();
      if (["", "none", "off", "simplex", "s", "0"].includes(d)) return rxMHz;
      if (d === "+") return rxMHz + offsetMHz;
      if (d === "-") return rxMHz - offsetMHz;
      throw new Error("Duplex must be +, -, or 0");
    }

    function sanitizeName(name) {
      const n = name.trim().toUpperCase();
      if (n.length > NAME_LENGTH) throw new Error("Channel name must be at most 7 characters");
      if (!/^[\x00-\x7F]*$/.test(n)) throw new Error("Channel name must be ASCII");
      return n;
    }

    function buildNameRecord(existingRaw, name) {
      const out = new Uint8Array(existingRaw);
      const n = sanitizeName(name);
      for (let i = 0; i < NAME_LENGTH; i++) {
        out[i] = i < n.length ? n.charCodeAt(i) : 0xFF;
      }
      return out;
    }

    function encodeFlags(existingRaw) {
      const out = new Uint8Array(existingRaw);
      out[14] &= 0xFE;
      out[15] &= ~0x4F;
      out[15] |= 0x04;
      out[15] |= 0x40;
      return out;
    }

    function buildRecordFromInputs(existingRaw, rxMHz, duplex, offsetMHz, rxToneWord, txToneWord) {
      const txMHz = computeTxMHz(rxMHz, duplex, offsetMHz);
      const out = new Uint8Array(existingRaw);

      out.set(mhzToFreqBytes(rxMHz), 0);
      out.set(mhzToFreqBytes(txMHz), 4);

      out[8] = rxToneWord & 0xFF;
      out[9] = (rxToneWord >> 8) & 0xFF;
      out[10] = txToneWord & 0xFF;
      out[11] = (txToneWord >> 8) & 0xFF;

      return encodeFlags(out);
    }

    function freqBytesToMHz(data) {
      let digits = "";
      for (let i = data.length - 1; i >= 0; i--) {
        const b = data[i];
        const hi = (b >> 4) & 0x0F;
        const lo = b & 0x0F;
        digits += `${hi}${lo}`;
      }
      return Number(digits) / 100000.0;
    }

    function decodeTone(word) {
      if (word === 0 || word === 0xFFFF) {
        return { mode: "", value: null, polarity: "N" };
      }

      if (word >= 0x0258) {
        return { mode: "Tone", value: word / 10.0, polarity: "N" };
      }

      const ndcs = DTCS_CODES.length;
      if (word >= 1 && word <= ndcs) {
        return { mode: "DTCS", value: DTCS_CODES[word - 1], polarity: "N" };
      }
      if (word >= (ndcs + 2) && word <= (2 * ndcs + 1)) {
        return { mode: "DTCS", value: DTCS_CODES[word - ndcs - 2], polarity: "R" };
      }

      return { mode: "Unknown", value: word, polarity: "?" };
    }

    function parseMemRecord(raw) {
      const rxMHz = freqBytesToMHz(raw.slice(0, 4));
      const txMHz = freqBytesToMHz(raw.slice(4, 8));
      const rxToneWord = raw[8] | (raw[9] << 8);
      const txToneWord = raw[10] | (raw[11] << 8);
      const rxTone = decodeTone(rxToneWord);
      const txTone = decodeTone(txToneWord);

      let duplex = "";
      let offset = 0.0;
      if (Math.abs(rxMHz - txMHz) < 0.00001) {
        duplex = "";
        offset = 0.0;
      } else if (txMHz > rxMHz) {
        duplex = "+";
        offset = Number((txMHz - rxMHz).toFixed(5));
      } else {
        duplex = "-";
        offset = Number((rxMHz - txMHz).toFixed(5));
      }

      let toneMode = "";
      if (txTone.mode === "Tone" && !rxTone.mode) {
        toneMode = "Tone";
      } else if (txTone.mode === "Tone" && rxTone.mode === "Tone" && txTone.value === rxTone.value) {
        toneMode = "TSQL";
      } else if (txTone.mode === "DTCS" && rxTone.mode === "DTCS" && txTone.value === rxTone.value) {
        toneMode = "DTCS";
      } else if (txTone.mode || rxTone.mode) {
        toneMode = "Cross";
      }

      return {
        rxMHz,
        txMHz,
        duplex,
        offset,
        toneMode,
        rxTone,
        txTone,
        rawHex: hx(raw)
      };
    }

    async function identRadio() {
      clearRxBuffer();
      log("Starting handshake...");

      for (const b of MAGIC) {
        await writeBytes([b]);
        await sleep(10);
      }

      const ack1 = await readExact(1);
      log(`ack1: ${hx(ack1)}`);
      if (ack1[0] !== ACK) {
        throw new Error(`No ACK after magic: ${hx(ack1)}`);
      }

      await writeBytes([ENQ]);
      await sleep(150);

      const ident = [];
      for (let i = 0; i < 12; i++) {
        const byte = await readExact(1);
        ident.push(byte[0]);
        if (byte[0] === 0xDD) break;
      }

      const identArr = Uint8Array.from(ident);
      log(`ident: ${hx(identArr)}`);

      if (identArr.length < 8 || identArr[identArr.length - 1] !== 0xDD) {
        throw new Error(`Bad ident reply: ${hx(identArr)}`);
      }

      await writeBytes([ACK]);
      await sleep(50);

      const ack2 = await readExact(1);
      log(`ack2: ${hx(ack2)}`);
      if (ack2[0] !== ACK) {
        throw new Error(`Radio refused clone after ident: ${hx(ack2)}`);
      }

      return identArr;
    }

    function makeReadCommand(start, size = 0x40) {
      return Uint8Array.from([
        "S".charCodeAt(0),
        (start >> 8) & 0xFF,
        start & 0xFF,
        size & 0xFF
      ]);
    }

    function makeWriteHeader(start, size = 0x10) {
      return Uint8Array.from([
        "X".charCodeAt(0),
        (start >> 8) & 0xFF,
        start & 0xFF,
        size & 0xFF
      ]);
    }

    async function readBlock(start, size = 0x40, firstCommand = false) {
      await writeBytes(makeReadCommand(start, size));

      if (!firstCommand) {
        const ack = await readExact(1);
        if (ack[0] !== ACK) {
          throw new Error(`Missing pre-header ACK for block 0x${start.toString(16).padStart(4, "0")}: ${hx(ack)}`);
        }
      }

      const header = await readExact(4);
      const cmd = header[0];
      const addr = (header[1] << 8) | header[2];
      const len = header[3];

      if (cmd !== "X".charCodeAt(0) || addr !== start || len !== size) {
        throw new Error(`Unexpected block header: ${hx(header)}`);
      }

      const data = await readExact(size);
      await writeBytes([ACK]);
      await sleep(30);
      return data;
    }

    async function writeBlock16(start, data16) {
      if (data16.length !== 16) {
        throw new Error("Write block must be 16 bytes");
      }

      await writeBytes(makeWriteHeader(start, 0x10));
      await writeBytes(data16);

      const ack = await readExact(1);
      if (ack[0] !== ACK) {
        throw new Error(`Bad ACK after write to 0x${start.toString(16).padStart(4, "0")}: ${hx(ack)}`);
      }
    }

    async function readRecord(recno, firstCommand = true) {
      const addr = recno * MEM_RECORD_SIZE;
      const blockStart = addr - (addr % 0x40);
      const block = await readBlock(blockStart, 0x40, firstCommand);
      const offset = addr - blockStart;
      return block.slice(offset, offset + 16);
    }

    async function readNameRecord(recno, firstCommand = false) {
      const addr = NAME_TABLE_OFFSET + recno * NAME_RECORD_SIZE;
      const blockStart = addr - (addr % 0x40);
      const block = await readBlock(blockStart, 0x40, firstCommand);
      const offset = addr - blockStart;
      return block.slice(offset, offset + 16);
    }

    function parseNameRecord(raw) {
      const chars = [];
      for (let i = 0; i < NAME_LENGTH; i++) {
        const b = raw[i];
        if (b === 0x00 || b === 0xFF) break;
        chars.push(String.fromCharCode(b));
      }
      return chars.join("");
    }

    async function connectSerial() {
      if (!("serial" in navigator)) {
        throw new Error("Web Serial API not available in this browser");
      }

      port = await navigator.serial.requestPort();
      await port.open({
        baudRate: 9600,
        dataBits: 8,
        stopBits: 1,
        parity: "none",
        flowControl: "none"
      });

      writer = port.writable.getWriter();
      reader = port.readable.getReader();
      clearRxBuffer();

      log("Connected.");
      setStatus("Connected", true);
    }

    async function disconnectSerial() {
      try {
        if (reader) {
          await reader.cancel();
        }
      } catch (e) {
      }

      try {
        if (reader) {
          reader.releaseLock();
          reader = null;
        }
      } catch (e) {
      }

      try {
        if (writer) {
          writer.releaseLock();
          writer = null;
        }
      } catch (e) {
      }

      try {
        if (port) {
          await port.close();
          port = null;
        }
      } catch (e) {
      }

      clearRxBuffer();
      log("Disconnected.");
      setStatus("Not connected", false);
    }

    function getToneWordsFromUI() {
      const toneMode = document.getElementById("toneMode").value;

      if (toneMode === "NONE") {
        return { rxToneWord: 0, txToneWord: 0 };
      }

      if (toneMode === "Tone") {
        const ctcssTone = document.getElementById("ctcssTone").value;
        return { rxToneWord: 0, txToneWord: encodeToneToken(ctcssTone) };
      }

      if (toneMode === "TSQL") {
        const ctcssTone = document.getElementById("ctcssTone").value;
        const word = encodeToneToken(ctcssTone);
        return { rxToneWord: word, txToneWord: word };
      }

      if (toneMode === "DTCS") {
        const dtcsCode = document.getElementById("dtcsCode").value;
        const dtcsPolarity = document.getElementById("dtcsPolarity").value;
        const token = `D${dtcsCode}${dtcsPolarity}`;
        const word = encodeToneToken(token);
        return { rxToneWord: word, txToneWord: word };
      }

      if (toneMode === "Cross") {
        const rxType = document.getElementById("crossRxType").value;
        const rxValue = document.getElementById("crossRxValue").value.trim();
        const txType = document.getElementById("crossTxType").value;
        const txValue = document.getElementById("crossTxValue").value.trim();

        let rxToneWord = 0;
        let txToneWord = 0;

        if (rxType === "CTCSS") rxToneWord = encodeToneToken(rxValue);
        else if (rxType === "DTCS") rxToneWord = encodeToneToken(rxValue.toUpperCase().startsWith("D") ? rxValue : `D${rxValue}`);

        if (txType === "CTCSS") txToneWord = encodeToneToken(txValue);
        else if (txType === "DTCS") txToneWord = encodeToneToken(txValue.toUpperCase().startsWith("D") ? txValue : `D${txValue}`);

        return { rxToneWord, txToneWord };
      }

      throw new Error(`Unsupported tone mode: ${toneMode}`);
    }

    async function readExisting() {
      const mem = Number(document.getElementById("mem").value);

      await identRadio();
      const raw = await readRecord(mem, true);
      const nameRaw = await readNameRecord(mem, false);
      const parsed = parseMemRecord(raw);
      const name = parseNameRecord(nameRaw);

      log(`Memory ${mem} raw: ${hx(raw)}`);
      log(`Name ${mem} raw:   ${hx(nameRaw)}`);
      log(`Name: ${name}`);
      log(`RX: ${parsed.rxMHz.toFixed(5)} MHz`);
      log(`TX: ${parsed.txMHz.toFixed(5)} MHz`);
      log(`Duplex: ${parsed.duplex || "0"}`);
      log(`Offset: ${parsed.offset.toFixed(5)} MHz`);
      log(`Tone mode: ${parsed.toneMode || "NONE"}`);
      log(`RX tone: ${JSON.stringify(parsed.rxTone)}`);
      log(`TX tone: ${JSON.stringify(parsed.txTone)}`);
    }

    async function writeChannel() {
      const mem = Number(document.getElementById("mem").value);
      const rxMHz = Number(document.getElementById("freq").value);
      const duplex = document.getElementById("duplex").value;
      const offsetMHz = Number(document.getElementById("offset").value);
      const name = document.getElementById("name").value;

      const { rxToneWord, txToneWord } = getToneWordsFromUI();

      await identRadio();
      const oldRaw = await readRecord(mem, true);
      const oldNameRaw = await readNameRecord(mem, false);

      const newRaw = buildRecordFromInputs(oldRaw, rxMHz, duplex, offsetMHz, rxToneWord, txToneWord);
      const newNameRaw = buildNameRecord(oldNameRaw, name);
      const parsed = parseMemRecord(newRaw);

      log("");
      log("New record to write");
      log("----------------------------------");
      log(`Memory number : ${mem}`);
      log(`Name          : ${sanitizeName(name)}`);
      log(`RX frequency  : ${parsed.rxMHz.toFixed(5)} MHz`);
      log(`TX frequency  : ${parsed.txMHz.toFixed(5)} MHz`);
      log(`Duplex        : ${parsed.duplex || "0"}`);
      log(`Offset        : ${parsed.offset.toFixed(5)} MHz`);
      log(`Tone mode     : ${parsed.toneMode || "NONE"}`);
      log(`RX tone       : ${JSON.stringify(parsed.rxTone)}`);
      log(`TX tone       : ${JSON.stringify(parsed.txTone)}`);

      if (!confirm(`Write memory ${mem}?`)) {
        log("Write cancelled.");
        return;
      }

      const recAddr = mem * MEM_RECORD_SIZE;
      const nameAddr = NAME_TABLE_OFFSET + mem * NAME_RECORD_SIZE;

      log("Writing memory block...");
      await writeBlock16(recAddr, newRaw);
      await sleep(150);

      log("Writing name block...");
      await writeBlock16(nameAddr, newNameRaw);
      await sleep(250);

      log(`Wrote memory record at address 0x${recAddr.toString(16).padStart(4, "0").toUpperCase()}`);
      log(`Wrote name record at address 0x${nameAddr.toString(16).padStart(4, "0").toUpperCase()}`);
      log("Defaults used: Wide, High power, Include in scan, BCL Off, PTT ID Off");
      log("Write completed.");
      log("Power-cycle the radio after clone/write mode if needed.");
    }

    function populateToneDropdowns() {
      const ctcss = document.getElementById("ctcssTone");
      const dtcs = document.getElementById("dtcsCode");

      ctcss.innerHTML = "";
      dtcs.innerHTML = "";

      for (const tone of CTCSS_TONES) {
        const opt = document.createElement("option");
        opt.value = tone.toFixed(1);
        opt.textContent = tone.toFixed(1);
        ctcss.appendChild(opt);
      }

      for (const code of DTCS_CODES) {
        const opt = document.createElement("option");
        opt.value = String(code);
        opt.textContent = String(code);
        dtcs.appendChild(opt);
      }

      ctcss.value = "123.0";
      dtcs.value = "23";
    }

    function showHide(id, show) {
      const el = document.getElementById(id);
      const label = document.getElementById(id + "Label");
      if (el) el.classList.toggle("hidden", !show);
      if (label) label.classList.toggle("hidden", !show);
    }

    function updateToneUI() {
      const mode = document.getElementById("toneMode").value;

      showHide("ctcssTone", mode === "Tone" || mode === "TSQL");
      showHide("dtcsCode", mode === "DTCS");
      showHide("dtcsPolarity", mode === "DTCS");

      showHide("crossRxType", mode === "Cross");
      showHide("crossRxValue", mode === "Cross");
      showHide("crossTxType", mode === "Cross");
      showHide("crossTxValue", mode === "Cross");
    }

    function setupBrowserWarning() {
      const hasSerial = "serial" in navigator;
      document.getElementById("browserWarning").style.display = hasSerial ? "none" : "block";
    }

    document.getElementById("connectBtn").addEventListener("click", async () => {
      try {
        await connectSerial();
      } catch (e) {
        log(`ERROR: ${e.message}`);
      }
    });

    document.getElementById("disconnectBtn").addEventListener("click", async () => {
      try {
        await disconnectSerial();
      } catch (e) {
        log(`ERROR: ${e.message}`);
      }
    });

    document.getElementById("readBtn").addEventListener("click", async () => {
      try {
        await readExisting();
      } catch (e) {
        log(`ERROR: ${e.message}`);
      }
    });

    document.getElementById("writeBtn").addEventListener("click", async () => {
      try {
        await writeChannel();
      } catch (e) {
        log(`ERROR: ${e.message}`);
      }
    });

    document.getElementById("clearLogBtn").addEventListener("click", () => {
      clearLog();
    });

    document.getElementById("toneMode").addEventListener("change", updateToneUI);

    populateToneDropdowns();
    updateToneUI();
    setupBrowserWarning();
  </script>
</body>
</html>
